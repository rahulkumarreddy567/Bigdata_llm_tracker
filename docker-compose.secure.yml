# ─────────────────────────────────────────────
# LLM Cost vs Performance Tracker (SECURE VERSION)
# Services: Airflow + PostgreSQL + Elasticsearch + Kibana
# ─────────────────────────────────────────────
# NOTE: Copy .env.example to .env and customize with your credentials

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: llm-tracker-airflow:local
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./ingestion:/opt/airflow/ingestion
    - ./dbt_project:/opt/airflow/dbt_project
    - ./indexing:/opt/airflow/indexing
    - ./data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - llm_net

services:

  # ── PostgreSQL (Airflow metadata DB) ──────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - llm_net

  # ── Airflow Init (runs once) ──────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USERNAME:-admin} --firstname Rahul --lastname Duggempudi --role Admin --email rahul@isep.fr --password ${AIRFLOW_ADMIN_PASSWORD:-admin}"
    restart: "no"

  # ── Airflow Webserver ─────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Airflow Scheduler ─────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

  # ── Elasticsearch ─────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - llm_net

  # ── Kibana ────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      XPACK_SECURITY_ENABLED: 'false'
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -v '\"level\":\"critical\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - llm_net

volumes:
  postgres-db:
  airflow-logs:
  airflow-plugins:
  elasticsearch-data:

networks:
  llm_net:
    driver: bridge
