[build]
builder = "DOCKERFILE"
dockerfilePath = "/llm_tracker/railway/Dockerfile.elasticsearch"

[deploy]
startCommand = "/bin/bash -lc 'exec /bin/tini -- /usr/local/bin/docker-entrypoint.sh eswrapper'"
healthcheckPath = "/_cluster/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
