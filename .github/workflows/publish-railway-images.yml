name: Publish Railway Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "llm_tracker/requirements-airflow.txt"
      - "llm_tracker/setup_kibana_dashboard.py"
      - "llm_tracker/dags/**"
      - "llm_tracker/ingestion/**"
      - "llm_tracker/indexing/**"
      - "llm_tracker/dbt_project/**"
      - "llm_tracker/kibana/**"
      - "llm_tracker/railway/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: rahulkumarreddy567/bigdata-llm-tracker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: airflow
            dockerfile: ./llm_tracker/railway/Dockerfile.airflow
            image_suffix: airflow
          - name: elasticsearch
            dockerfile: ./llm_tracker/railway/Dockerfile.elasticsearch
            image_suffix: elasticsearch
          - name: kibana
            dockerfile: ./llm_tracker/railway/Dockerfile.kibana
            image_suffix: kibana
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./llm_tracker
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
