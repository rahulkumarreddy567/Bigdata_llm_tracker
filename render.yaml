envVarGroups:
  - name: bigdata-llm-tracker-airflow-shared
    envVars:
      - key: AIRFLOW__CORE__FERNET_KEY
        generateValue: true

databases:
  - name: bigdata-llm-tracker-postgres
    plan: basic-256mb
    databaseName: airflow
    user: airflow
    ipAllowList: []

services:
  - type: pserv
    name: bigdata-llm-tracker-elasticsearch
    runtime: docker
    plan: starter
    dockerContext: ./llm_tracker
    dockerfilePath: ./llm_tracker/railway/Dockerfile.elasticsearch
    disk:
      name: elasticsearch-data
      mountPath: /usr/share/elasticsearch/data
      sizeGB: 10
    envVars:
      - key: ES_JAVA_OPTS
        value: -Xms1g -Xmx1g

  - type: web
    name: bigdata-llm-tracker-kibana
    runtime: docker
    plan: starter
    dockerContext: ./llm_tracker
    dockerfilePath: ./llm_tracker/railway/Dockerfile.kibana
    healthCheckPath: /api/status
    envVars:
      - key: ELASTICSEARCH_HOST
        fromService:
          type: pserv
          name: bigdata-llm-tracker-elasticsearch
          property: host
      - key: ELASTICSEARCH_PORT
        fromService:
          type: pserv
          name: bigdata-llm-tracker-elasticsearch
          property: port

  - type: web
    name: bigdata-llm-tracker-airflow
    runtime: docker
    plan: starter
    dockerContext: ./llm_tracker
    dockerfilePath: ./llm_tracker/railway/Dockerfile.airflow
    dockerCommand: /bin/bash /opt/airflow/airflow-webserver-start.sh
    initialDeployHook: /bin/bash /opt/airflow/render-bootstrap-dashboard.sh
    healthCheckPath: /health
    envVars:
      - fromGroup: bigdata-llm-tracker-airflow-shared
      - key: DATABASE_URL
        fromDatabase:
          name: bigdata-llm-tracker-postgres
          property: connectionString
      - key: AIRFLOW_ADMIN_USERNAME
        value: admin
      - key: AIRFLOW_ADMIN_PASSWORD
        generateValue: true
      - key: AIRFLOW_ADMIN_FIRSTNAME
        value: Rahul
      - key: AIRFLOW_ADMIN_LASTNAME
        value: Duggempudi
      - key: AIRFLOW_ADMIN_EMAIL
        sync: false
      - key: KIBANA_HOST
        fromService:
          type: web
          name: bigdata-llm-tracker-kibana
          property: host
      - key: KIBANA_PORT
        fromService:
          type: web
          name: bigdata-llm-tracker-kibana
          property: port
      - key: ELASTICSEARCH_HOST
        fromService:
          type: pserv
          name: bigdata-llm-tracker-elasticsearch
          property: host
      - key: ELASTICSEARCH_PORT
        fromService:
          type: pserv
          name: bigdata-llm-tracker-elasticsearch
          property: port

  - type: worker
    name: bigdata-llm-tracker-scheduler
    runtime: docker
    plan: starter
    dockerContext: ./llm_tracker
    dockerfilePath: ./llm_tracker/railway/Dockerfile.airflow
    dockerCommand: /bin/bash /opt/airflow/airflow-scheduler-start.sh
    disk:
      name: airflow-data
      mountPath: /opt/airflow/data
      sizeGB: 10
    envVars:
      - fromGroup: bigdata-llm-tracker-airflow-shared
      - key: DATABASE_URL
        fromDatabase:
          name: bigdata-llm-tracker-postgres
          property: connectionString
